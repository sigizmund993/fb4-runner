<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Robot Dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: monospace; background: #1a1a2e; color: #e0e0e0; }
  .header { background: #16213e; padding: 12px 20px; text-align: center;
             font-size: 18px; border-bottom: 2px solid #0f3460; }
  .main { display: flex; gap: 8px; padding: 8px; height: calc(100vh - 50px); }
  .camera {
    flex: 2; background: #000; border-radius: 6px; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  .camera img { width: 100%; height: 100%; object-fit: contain; display: block; }
  .camera canvas {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none;
  }
  .sidebar { flex: 1; display: flex; flex-direction: column; gap: 8px;
              min-width: 280px; max-width: 400px; }
  .card { background: #16213e; border-radius: 6px; padding: 14px;
           border: 1px solid #0f3460; }
  .card h3 { color: #53a8b6; margin-bottom: 8px; font-size: 13px;
              text-transform: uppercase; letter-spacing: 1px; }
  .row { display: flex; justify-content: space-between; padding: 4px 0;
          border-bottom: 1px solid #0f346033; }
  .row:last-child { border: none; }
  .label { color: #888; }
  .value { color: #e94560; font-weight: bold; }
  .value.ok { color: #4ecca3; }
  .value.warn { color: #f0a500; }
  .ball-pos { width: 100%; height: 120px; background: #0f3460;
              border-radius: 4px; position: relative; margin-top: 6px; }
  .ball-dot { width: 10px; height: 10px; background: #e94560;
              border-radius: 50%; position: absolute; transform: translate(-50%, -50%);
              transition: left 0.1s, top 0.1s; }
  .status { display: inline-block; width: 8px; height: 8px;
            border-radius: 50%; margin-right: 6px; }
  .status.on { background: #4ecca3; }
  .status.off { background: #e94560; }
</style>
</head>
<body>
<div class="header">ROBOT DASHBOARD</div>
<div class="main">
  <div class="camera">
    <img id="stream" alt="Camera stream">
    <canvas id="overlay"></canvas>
  </div>
  <div class="sidebar">
    <div class="card">
      <h3><span class="status on" id="cam-status"></span>Camera</h3>
      <div class="row"><span class="label">Stream</span><span class="value" id="cam-url">mediaMTX</span></div>
      <div class="row"><span class="label">Status</span><span class="value" id="cam-state">connecting</span></div>
    </div>
    <div class="card">
      <h3>Ball Tracking</h3>
      <div class="row"><span class="label">X</span><span class="value" id="ball-x">--</span></div>
      <div class="row"><span class="label">Y</span><span class="value" id="ball-y">--</span></div>
      <div class="ball-pos"><div class="ball-dot" id="ball-dot"></div></div>
    </div>
    <div class="card">
      <h3>RPI System</h3>
      <div class="row"><span class="label">Temperature</span><span class="value" id="rpi-temp">--</span></div>
      <div class="row"><span class="label">Voltage</span><span class="value" id="rpi-volt">--</span></div>
      <div class="row"><span class="label">Throttled</span><span class="value" id="rpi-throt">--</span></div>
    </div>
    <div class="card">
      <h3>UART Telemetry</h3>
      <div id="uart-data" style="font-size: 12px; white-space: pre-wrap; color: #888;">waiting...</div>
    </div>
  </div>
</div>
<script>
var FRAME_W = 640;
var FRAME_H = 480;

var img = document.getElementById('stream');
var canvas = document.getElementById('overlay');
var ctx = canvas.getContext('2d');
img.src = MEDIA_STREAM_URL;

img.onerror = function() {
  document.getElementById('cam-status').className = 'status off';
  document.getElementById('cam-state').textContent = 'offline';
};
img.onload = function() {
  document.getElementById('cam-status').className = 'status on';
  document.getElementById('cam-state').textContent = 'online';
  resizeCanvas();
};

function resizeCanvas() {
  canvas.width = canvas.clientWidth;
  canvas.height = canvas.clientHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

function mapX(x) { return (x / FRAME_W) * canvas.width; }
function mapY(y) { return (y / FRAME_H) * canvas.height; }

function drawBall(x, y) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  if (x < 0 || y < 0) return;

  var cx = mapX(x);
  var cy = mapY(y);
  var r = 14;

  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.strokeStyle = '#e94560';
  ctx.lineWidth = 2.5;
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(cx - r - 6, cy);
  ctx.lineTo(cx - r + 4, cy);
  ctx.moveTo(cx + r - 4, cy);
  ctx.lineTo(cx + r + 6, cy);
  ctx.moveTo(cx, cy - r - 6);
  ctx.lineTo(cx, cy - r + 4);
  ctx.moveTo(cx, cy + r - 4);
  ctx.lineTo(cx, cy + r + 6);
  ctx.strokeStyle = '#e94560';
  ctx.lineWidth = 2;
  ctx.stroke();

  ctx.beginPath();
  ctx.arc(cx, cy, 2.5, 0, Math.PI * 2);
  ctx.fillStyle = '#e94560';
  ctx.fill();
}

function poll() {
  fetch('/api/status').then(function(r){ return r.json(); }).then(function(d) {
    var t = d.temperature;
    var tempEl = document.getElementById('rpi-temp');
    tempEl.textContent = t !== null ? t + ' C' : 'n/a';
    tempEl.className = 'value' + (t !== null && t < 70 ? ' ok' : t !== null ? ' warn' : '');

    var v = d.power.voltage;
    var voltEl = document.getElementById('rpi-volt');
    voltEl.textContent = v !== null ? v.toFixed(2) + ' V' : 'n/a';
    voltEl.className = 'value' + (v !== null && v > 4.5 ? ' ok' : v !== null ? ' warn' : '');

    document.getElementById('rpi-throt').textContent = d.power.throttled || 'n/a';

    var bx = d.ball[0], by = d.ball[1];
    document.getElementById('ball-x').textContent = bx >= 0 ? bx.toFixed(1) : 'not found';
    document.getElementById('ball-y').textContent = by >= 0 ? by.toFixed(1) : 'not found';
    var dot = document.getElementById('ball-dot');
    dot.style.left = bx >= 0 ? (bx / FRAME_W * 100) + '%' : '-100px';
    dot.style.top = by >= 0 ? (by / FRAME_H * 100) + '%' : '-100px';

    drawBall(bx, by);

    if (d.uart) {
      document.getElementById('uart-data').textContent = d.uart;
    }
  }).catch(function(){});
  setTimeout(poll, 500);
}
poll();
</script>
</body>
</html>
